  <template id="md4">Исправь сигнатуру `integrate` под **вариант 4** и добавь ссылку на *раздел 2.3* методички.</template>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
(function () {
  var reportTypMd = "# Лабораторная работа №3\n\n## Задание (docs/report.typ)\n\nЦель — реализовать численное **интегрирование** на отрезке \\[a, b\\] методом Симпсона.\n\n### Требования\n\n1. Ввод коэффициентов согласно **варианту 4**.\n2. Погрешность не выше `1e-6`.\n3. Оформить вывод в отчёт (см. шаблон).\n\n> Методичка: разделы 1–3 обязательны к цитированию.\n\n---\n\n*Демо: превью как Markdown, в продукте — рендер Typst/PDF из `docs/report.typ`.*\n";

  function renderMdInto(el, templateOrText) {
    var raw = typeof templateOrText === "string" ? templateOrText : (templateOrText && templateOrText.innerHTML) || "";
    var div = document.createElement("div");
    div.className = "md";
    div.innerHTML = typeof marked !== "undefined" ? marked.parse(raw, { breaks: true }) : raw;
    el.appendChild(div);
  }

  document.querySelectorAll(".msg-bubble[data-md]").forEach(function (bubble) {
    var id = bubble.getAttribute("data-md");
    var tpl = document.getElementById(id);
    if (tpl) renderMdInto(bubble, tpl);
  });

  var previewRoot = document.getElementById("preview-md-root");
  if (previewRoot && typeof marked !== "undefined") {
    previewRoot.innerHTML =
      '<p class="path-tag"><i class="hgi-stroke hgi-file-01" style="font-size:14px;vertical-align:-2px;margin-right:6px;opacity:0.65" aria-hidden="true"></i>docs/report.typ · превью задания</p>' +
      marked.parse(reportTypMd, { breaks: true });
  }

  var tabs = document.querySelectorAll(".tab[data-tab]");
  var panelEditor = document.getElementById("panel-editor");
  var panelPreview = document.getElementById("panel-preview");
  var editorBody = document.getElementById("editor-body");
  var tabPreview = document.getElementById("tab-preview");
  var lastCodeTab = "main";
  var fileBuffers = {
    main: "#include <iostream>\n\ndouble integrate(double a, double b) {\n  // Simpson\n  return 0.0;\n}",
    typ: "#set page(margin: 2cm)\n\n= Отчёт\n== Постановка задачи\nДемо: содержимое report.typ…"
  };

  function setMode(mode) {
    if (mode === "main" || mode === "typ") lastCodeTab = mode;
    var isPreview = mode === "preview";
    panelEditor.classList.toggle("hidden", isPreview);
    panelPreview.classList.toggle("visible", isPreview);
    tabPreview.classList.toggle("active", isPreview);
    tabPreview.setAttribute("aria-selected", isPreview ? "true" : "false");
    tabs.forEach(function (t) {
      if (t === tabPreview) return;
      var m = t.getAttribute("data-tab");
      var on = !isPreview && ((mode === "main" && m === "main") || (mode === "typ" && m === "typ"));
      t.classList.toggle("active", on);
      t.setAttribute("aria-selected", on ? "true" : "false");
    });
    if (!isPreview && editorBody) {
      editorBody.textContent = fileBuffers[mode] || "";
    }
    panelPreview.setAttribute("aria-hidden", isPreview ? "false" : "true");
  }

  setMode("main");

  tabs.forEach(function (t) {
    t.addEventListener("click", function () {
      var m = t.getAttribute("data-tab");
      if (m === "preview") {
        if (tabPreview.classList.contains("active")) setMode(lastCodeTab);
        else setMode("preview");
      } else if (m === "main") setMode("main");
      else if (m === "typ") setMode("typ");
    });
  });
  var fileInput = document.getElementById("file-input");
  var chips = document.getElementById("attach-chips");
  document.getElementById("btn-attach").addEventListener("click", function () {
    fileInput.click();
  });
  document.getElementById("btn-add").addEventListener("click", function () {
    var chip = document.createElement("span");
    chip.className = "attach-chip";
    chip.innerHTML = '<i class="hgi-stroke hgi-add-01" aria-hidden="true"></i>';
    chip.appendChild(document.createTextNode("TASK.md разд. 4 · контекст"));
    chips.appendChild(chip);
  });
  fileInput.addEventListener("change", function () {
    Array.prototype.forEach.call(fileInput.files || [], function (f) {
      var chip = document.createElement("span");
      chip.className = "attach-chip";
      var ic = document.createElement("i");
      ic.className = "hgi-stroke hgi-attachment-01";
      ic.setAttribute("aria-hidden", "true");
      chip.appendChild(ic);
      chip.appendChild(document.createTextNode(f.name));
      chips.appendChild(chip);
    });
    fileInput.value = "";
  });
  document.getElementById("btn-send").addEventListener("click", function () {
    var ta = document.getElementById("composer");
    ta.value = "";
    chips.innerHTML = "";
    fileInput.value = "";
  });
})();
  </script>
</body>
</html>
